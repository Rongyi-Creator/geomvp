name = "foundbyai-worker"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Pre-launch: disable the public *.workers.dev URL so go.foundbyai.dk (custom
# domain) is the only entry. Re-enable (or delete this line) at public launch.
workers_dev = false

[vars]
SITE_URL = "https://go.foundbyai.dk"
GEO_PROXY_IP = "76.76.21.21"
DASHBOARD_URL = "https://geo-dashboard.blake-designing.workers.dev"
OPS_EMAILS = "hello.rongyi@gmail.com"

# Landing + legal pages served as static assets; Worker handles /api/*, /activate, etc.
# Static asset matches win; unmatched paths fall through to the fetch handler below.
[assets]
directory = "./public"

[[kv_namespaces]]
binding = "DASHBOARD_KV"
id = "76d59151b3934aa1b29306d6b6301293"

[triggers]
crons = ["*/5 * * * *"]

# Secrets (set via: wrangler secret put <NAME>)
# ANTHROPIC_API_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# STRIPE_PRICE_ID
# RESEND_API_KEY
# DASHBOARD_TOKEN   (master ops token, same value as dashboard worker; needed for /?view=ops)
