<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GEO Reforge Dashboard</title>
<style>
  :root {
    --bg:          #0f1117;
    --surface:     #1a1d27;
    --surface2:    #22263a;
    --border:      #2d3148;
    --primary:     #2E5E4E;
    --primary-l:   #4A8B76;
    --primary-d:   #1D3D33;
    --text:        #e5e7eb;
    --text-muted:  #6b7280;
    --green:       #22c55e;
    --red:         #ef4444;
    --blue:        #60a5fa;
    --yellow:      #fbbf24;
    --radius:      8px;
    --mono:        "JetBrains Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 700;
    color: var(--primary-l);
    letter-spacing: -0.3px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--primary);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  #env-status {
    display: flex;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .env-pill {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 8px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-size: 11px;
  }
  .env-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .env-pill.ok .dot  { background: var(--green); }
  .env-pill.miss .dot { background: var(--red); }

  /* ── Main layout ────────────────────────────────────── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 24px 24px 0;
  }

  /* ── Pipeline toggle ───────────────────────────────── */
  .pipeline-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    width: fit-content;
  }
  .pipeline-btn {
    padding: 8px 20px;
    background: var(--surface);
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pipeline-btn:not(:last-child) { border-right: 1px solid var(--border); }
  .pipeline-btn:hover { background: var(--surface2); color: var(--text); }
  .pipeline-btn.active { background: var(--primary-d); color: var(--primary-l); }
  .pipeline-tag {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 2px 5px;
    border-radius: 3px;
    background: var(--primary);
    color: #fff;
  }

  /* ── Inputs ─────────────────────────────────────────── */
  .inputs {
    display: grid;
    grid-template-columns: 1fr 1fr auto auto;
    gap: 10px;
    align-items: end;
    margin-bottom: 20px;
  }
  .inputs.clone-mode, .inputs.edge-mode {
    grid-template-columns: 1fr 1fr;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); font-weight: 600; }
  input, select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--primary-l); }
  input::placeholder { color: var(--text-muted); }

  /* ── Steps row ──────────────────────────────────────── */
  .steps-bar {
    display: flex;
    gap: 8px;
    align-items: stretch;
    margin-bottom: 20px;
  }
  .step-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
    color: var(--text);
    position: relative;
    overflow: hidden;
  }
  .step-btn:hover:not(:disabled) { border-color: var(--primary-l); background: var(--surface2); }

  .step-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .step-num {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .step-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .step-name {
    font-size: 13px;
    font-weight: 600;
  }
  .step-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
  }
  .step-status {
    font-size: 11px;
    color: var(--text-muted);
    min-height: 14px;
    white-space: nowrap;
  }
  .step-run-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    flex-shrink: 0;
    line-height: 1;
    padding-left: 1px;
  }
  .step-run-icon:hover {
    background: var(--primary);
    border-color: var(--primary-l);
    color: #fff;
  }

  /* Step states */
  .step-btn.selected { border-color: var(--primary-l); background: var(--surface2); }

  .step-btn.running  { border-color: var(--blue); }
  .step-btn.running .step-indicator  { background: var(--blue); animation: pulse 1s ease-in-out infinite; }
  .step-btn.running .step-status     { color: var(--blue); }

  .step-btn.done     { border-color: var(--green); }
  .step-btn.done .step-indicator     { background: var(--green); }
  .step-btn.done .step-status        { color: var(--green); }
  .step-btn.done .step-name          { color: var(--green); }

  .step-btn.error    { border-color: var(--red); }
  .step-btn.error .step-indicator    { background: var(--red); }
  .step-btn.error .step-status       { color: var(--red); }
  .step-btn.error .step-name         { color: var(--red); }

  /* Selected overrides for done/error (outline instead of full border) */
  .step-btn.done.selected  { outline: 2px solid var(--primary-l); outline-offset: -1px; }
  .step-btn.error.selected { outline: 2px solid var(--primary-l); outline-offset: -1px; }

  /* Progress bar on running step */
  .step-btn.running::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: var(--blue);
    animation: progress 2s linear infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes progress {
    0%   { width: 0%; left: 0; }
    50%  { width: 100%; left: 0; }
    100% { width: 0%; left: 100%; }
  }

  /* Run All button */
  .run-all-btn {
    padding: 12px 20px;
    background: var(--primary);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    min-width: 90px;
  }
  .run-all-btn:hover:not(:disabled) { background: var(--primary-l); }
  .run-all-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .run-all-icon { font-size: 18px; line-height: 1; }
  .run-all-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }

  /* ── Terminal ────────────────────────────────────────── */
  .terminal-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .terminal-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-shrink: 0;
  }
  .terminal-dots { display: flex; gap: 6px; }
  .terminal-dots span {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .terminal-dots .d1 { background: #ef4444; }
  .terminal-dots .d2 { background: #fbbf24; }
  .terminal-dots .d3 { background: #22c55e; }
  .terminal-title {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
    flex: 1;
    text-align: center;
  }
  .clear-btn {
    font-size: 11px;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .clear-btn:hover { color: var(--text); border-color: var(--text-muted); }

  #terminal {
    flex: 1;
    background: #0d1117;
    overflow-y: auto;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.6;
    min-height: 360px;
    max-height: 460px;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* Terminal text colors */
  .t-header  { color: #60a5fa; font-weight: 700; }
  .t-stdout  { color: #d1fae5; }
  .t-stderr  { color: #fde68a; }
  .t-done    { color: #22c55e; font-weight: 700; }
  .t-error   { color: #ef4444; font-weight: 700; }
  .t-cmd     { color: #9ca3af; }
  .t-divider { color: #2d3148; }
  .t-muted   { color: #4b5563; }

  /* ── Footer ─────────────────────────────────────────── */
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 24px;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #status-bar { font-family: var(--mono); color: var(--text-muted); }

  @media (max-width: 700px) {
    .inputs { grid-template-columns: 1fr; }
    .steps-bar { flex-wrap: wrap; }
    .step-btn { min-width: calc(50% - 4px); flex: unset; }
    .run-all-btn { width: 100%; flex-direction: row; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">G</div>
    GEO Reforge Console
  </div>
  <div id="env-status">
    <div class="env-pill" id="pill-firecrawl">
      <span class="dot"></span> Firecrawl
    </div>
    <div class="env-pill" id="pill-anthropic">
      <span class="dot"></span> Anthropic
    </div>
  </div>
</header>

<main>

  <!-- Pipeline toggle -->
  <div class="pipeline-toggle">
    <button class="pipeline-btn" data-pipeline="vercel-edge" onclick="setPipeline('vercel-edge')">
      Vercel Edge <span class="pipeline-tag">REC</span>
    </button>
    <button class="pipeline-btn" data-pipeline="edge" onclick="setPipeline('edge')">
      CF Edge
    </button>
    <button class="pipeline-btn" data-pipeline="clone" onclick="setPipeline('clone')">
      Clone + GEO
    </button>
    <button class="pipeline-btn" data-pipeline="template" onclick="setPipeline('template')">
      Template
    </button>
  </div>

  <!-- Inputs -->
  <div class="inputs" id="inputs-bar">
    <div class="field">
      <label for="inp-url">Target URL</label>
      <input id="inp-url" type="url" placeholder="https://example.com" value="https://virumakupunktur.dk" />
    </div>
    <div class="field">
      <label for="inp-client">Client Name</label>
      <input id="inp-client" type="text" placeholder="my-client" value="virum-akupunktur" />
    </div>
    <div class="field template-only">
      <label for="inp-scheme">Color Scheme</label>
      <select id="inp-scheme">
        <option value="scheme-a">Scheme A — Original</option>
        <option value="scheme-b">Scheme B — Warm</option>
        <option value="scheme-c">Scheme C — Cool</option>
      </select>
    </div>
    <div class="field template-only">
      <label for="inp-scrape-mode">Scrape Mode</label>
      <select id="inp-scrape-mode">
        <option value="auto">Auto (Firecrawl)</option>
        <option value="manual">Manual (fetch)</option>
      </select>
    </div>
  </div>

  <!-- Steps + Run All (rendered dynamically) -->
  <div class="steps-bar" id="steps-bar"></div>

  <!-- Terminal -->
  <div class="terminal-wrap">
    <div class="terminal-header">
      <div class="terminal-dots">
        <span class="d1"></span><span class="d2"></span><span class="d3"></span>
      </div>
      <div class="terminal-title" id="terminal-title">— ready —</div>
      <button class="clear-btn" onclick="clearCurrentLog()">Clear</button>
    </div>
    <div id="terminal"></div>
  </div>

</main>

<footer>
  <span>GEO Reforge Console</span>
  <span id="status-bar">Waiting for input…</span>
</footer>

<script>
  // ── Pipeline definitions ─────────────────────────────────────────────────
  const PIPELINES = {
    'vercel-edge': { steps: [
      { id: 1, label: 'Clone' },
      { id: 2, label: 'Extract' },
      { id: 3, label: 'Gen Vercel' },
      { id: 4, label: 'Deploy' },
      { id: 5, label: 'Verify' },
    ]},
    edge: { steps: [
      { id: 1, label: 'Clone' },
      { id: 2, label: 'Extract' },
      { id: 3, label: 'Gen Worker' },
      { id: 4, label: 'Deploy' },
      { id: 5, label: 'Verify' },
    ]},
    clone: { steps: [
      { id: 1, label: 'Clone' },
      { id: 2, label: 'Extract' },
      { id: 3, label: 'Inject' },
      { id: 4, label: 'QA' },
    ]},
    template: { steps: [
      { id: 1, label: 'Check' },
      { id: 2, label: 'Scrape' },
      { id: 3, label: 'Structure' },
      { id: 4, label: 'Generate' },
      { id: 5, label: 'QA' },
    ]},
  };

  // ── State ─────────────────────────────────────────────────────────────────
  let pipeline     = 'vercel-edge';
  let isRunning    = false;
  let currentES    = null;
  let selectedStep = null;     // which step's log is shown in terminal
  const stepLogs   = {};       // { "edge:1": "<html>...", "clone:2": "..." }
  const stepStates = {};       // { "edge:1": { state: "done", detail: "✓ 2.3s" } }

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const term        = document.getElementById('terminal');
  const statusBar   = document.getElementById('status-bar');
  const termTitle   = document.getElementById('terminal-title');
  const stepsBar    = document.getElementById('steps-bar');
  const inputsBar   = document.getElementById('inputs-bar');

  function getUrl()        { return document.getElementById('inp-url').value.trim(); }
  function getClient()     { return document.getElementById('inp-client').value.trim(); }
  function getScheme()     { return document.getElementById('inp-scheme').value; }
  function getScrapeMode() { return document.getElementById('inp-scrape-mode').value; }
  function getSteps()      { return PIPELINES[pipeline].steps; }
  function logKey(stepId)  { return `${pipeline}:${stepId}`; }

  // ── Log management (per-step) ────────────────────────────────────────────
  function appendToStep(stepId, html) {
    const key = logKey(stepId);
    if (!stepLogs[key]) stepLogs[key] = '';
    stepLogs[key] += html;
    if (selectedStep === stepId) {
      term.insertAdjacentHTML('beforeend', html);
      term.scrollTop = term.scrollHeight;
    }
  }

  function appendToStepText(stepId, text, cssClass = 't-stdout') {
    const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    appendToStep(stepId, `<span class="${cssClass}">${escaped}</span>`);
  }

  function showStepLog(stepId) {
    const key = logKey(stepId);
    term.innerHTML = stepLogs[key] || `<span class="t-muted">No output yet for this step.\n</span>`;
    term.scrollTop = term.scrollHeight;
    const step = getSteps().find(s => s.id === stepId);
    const saved = stepStates[key];
    if (saved) {
      termTitle.textContent = `Step ${stepId}: ${step?.label ?? '?'} — ${saved.state}`;
    } else {
      termTitle.textContent = `Step ${stepId}: ${step?.label ?? '?'}`;
    }
  }

  // ── Global log (shown when no step selected) ─────────────────────────────
  let globalLog = '';
  function appendGlobal(html) {
    globalLog += html;
    if (selectedStep === null) {
      term.insertAdjacentHTML('beforeend', html);
      term.scrollTop = term.scrollHeight;
    }
  }
  function showGlobalLog() {
    term.innerHTML = globalLog;
    term.scrollTop = term.scrollHeight;
    termTitle.textContent = '— overview —';
  }

  function clearCurrentLog() {
    if (selectedStep !== null) {
      stepLogs[logKey(selectedStep)] = '';
    } else {
      globalLog = '';
    }
    term.innerHTML = '';
    termTitle.textContent = '— ready —';
  }

  function setStatus(text) { statusBar.textContent = text; }

  // ── Pipeline switching ───────────────────────────────────────────────────
  function setPipeline(p) {
    if (isRunning) return;
    pipeline = p;
    selectedStep = null;
    document.querySelectorAll('.pipeline-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.pipeline === p);
    });
    document.querySelectorAll('.template-only').forEach(el => {
      el.style.display = p === 'template' ? '' : 'none';
    });
    const edgeMode = p === 'edge' || p === 'vercel-edge';
    inputsBar.className = `inputs${p === 'clone' ? ' clone-mode' : edgeMode ? ' edge-mode' : ''}`;
    renderSteps();
    showGlobalLog();
  }

  // ── Render step buttons ──────────────────────────────────────────────────
  function renderSteps() {
    const steps = getSteps();
    let html = '';
    steps.forEach((s, i) => {
      const key = logKey(s.id);
      const saved = stepStates[key];
      const stateClass = saved ? saved.state : '';
      const selClass = selectedStep === s.id ? ' selected' : '';
      const statusText = saved ? saved.detail || saved.state : 'idle';
      html += `<div class="step-btn ${stateClass}${selClass}" data-step="${s.id}" onclick="selectStep(${s.id})">
        <div class="step-top">
          <span class="step-num">STEP 0${i + 1}</span>
          <span class="step-indicator"></span>
        </div>
        <div class="step-name">${s.label}</div>
        <div class="step-bottom">
          <div class="step-status" id="status-${s.id}">${statusText}</div>
          <div class="step-run-icon" onclick="event.stopPropagation(); handleRunStep(${s.id})" title="Run this step">&#9654;</div>
        </div>
      </div>`;
    });
    html += `<button class="run-all-btn" id="run-all-btn" onclick="handleRunAll()">
      <span class="run-all-icon">&#9889;</span>
      <span class="run-all-label">RUN ALL</span>
    </button>`;
    stepsBar.innerHTML = html;
  }

  // ── Select step (view only, no execution) ────────────────────────────────
  function selectStep(stepId) {
    if (selectedStep === stepId) {
      selectedStep = null;
      showGlobalLog();
    } else {
      selectedStep = stepId;
      showStepLog(stepId);
    }
    updateSelectedVisual();
  }

  function updateSelectedVisual() {
    document.querySelectorAll('.step-btn[data-step]').forEach(btn => {
      const id = parseInt(btn.dataset.step);
      btn.classList.toggle('selected', selectedStep === id);
    });
  }

  // ── Step button states ───────────────────────────────────────────────────
  function setStepState(stepId, state, detail = '') {
    const key = logKey(stepId);
    stepStates[key] = { state, detail };
    const btn = document.querySelector(`[data-step="${stepId}"]`);
    const statusEl = document.getElementById(`status-${stepId}`);
    if (!btn || !statusEl) return;
    btn.className = `step-btn ${state}${selectedStep === stepId ? ' selected' : ''}`;
    statusEl.textContent = ({ idle:'idle', running:'running…', done: detail||'done', error: detail||'error' })[state] ?? state;
  }

  function resetAllSteps() {
    getSteps().forEach(s => {
      const key = logKey(s.id);
      delete stepStates[key];
      delete stepLogs[key];
      setStepState(s.id, 'idle');
    });
  }

  // ── Lock/unlock ──────────────────────────────────────────────────────────
  function lockUI() {
    isRunning = true;
    document.querySelectorAll('.run-all-btn, .pipeline-btn').forEach(b => b.disabled = true);
    document.querySelectorAll('.step-run-icon').forEach(b => b.style.pointerEvents = 'none');
  }
  function unlockUI() {
    isRunning = false;
    document.querySelectorAll('.run-all-btn, .pipeline-btn').forEach(b => b.disabled = false);
    document.querySelectorAll('.step-run-icon').forEach(b => b.style.pointerEvents = '');
  }

  // ── Run a single step ────────────────────────────────────────────────────
  function runStep(stepId) {
    return new Promise((resolve, reject) => {
      const url    = getUrl();
      const client = getClient();
      if (!url || !client) {
        appendToStep(stepId, `<span class="t-error">⚠ Please fill in URL and Client Name.\n</span>`);
        reject(new Error('Missing inputs')); return;
      }

      const step = getSteps().find(s => s.id === stepId);
      if (!step) { reject(new Error('Unknown step')); return; }

      // Clear previous log for this step
      stepLogs[logKey(stepId)] = '';

      // Auto-select this step to show live output
      selectedStep = stepId;
      updateSelectedVisual();
      showStepLog(stepId);

      appendToStep(stepId, `<span class="t-divider">${'─'.repeat(60)}\n</span>`);
      appendToStep(stepId, `<span class="t-header">▶  Step ${stepId}: ${step.label}\n</span>`);

      setStepState(stepId, 'running');
      setStatus(`Running Step ${stepId}: ${step.label}…`);

      const params = new URLSearchParams({
        pipeline, step: stepId, url, client,
        scheme: getScheme(), scrapeMode: getScrapeMode(),
      });
      const es = new EventSource(`/run?${params}`);
      currentES = es;

      es.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'start') {
          appendToStep(stepId, `<span class="t-cmd">$ ${msg.cmd}\n\n</span>`);
        } else if (msg.type === 'log') {
          appendToStepText(stepId, msg.text, msg.stream === 'stderr' ? 't-stderr' : 't-stdout');
        } else if (msg.type === 'done') {
          const secs = (msg.duration / 1000).toFixed(1);
          appendToStep(stepId, `\n<span class="t-done">Done in ${secs}s\n</span>`);
          setStepState(stepId, 'done', `${secs}s`);
          termTitle.textContent = `Step ${stepId}: ${step.label} — done (${secs}s)`;
          setStatus(`Step ${stepId} completed in ${secs}s`);
          es.close(); currentES = null; resolve(0);
        } else if (msg.type === 'error') {
          const secs = (msg.duration / 1000).toFixed(1);
          appendToStep(stepId, `\n<span class="t-error">Failed (exit ${msg.exitCode}) after ${secs}s\n</span>`);
          setStepState(stepId, 'error', `exit ${msg.exitCode}`);
          termTitle.textContent = `Step ${stepId}: ${step.label} — failed`;
          setStatus(`Step ${stepId} failed`);
          es.close(); currentES = null; reject(new Error(`Exit ${msg.exitCode}`));
        }
      };

      es.onerror = () => {
        appendToStep(stepId, `<span class="t-error">Connection lost.\n</span>`);
        setStepState(stepId, 'error', 'connection error');
        termTitle.textContent = `Step ${stepId} — connection error`;
        es.close(); currentES = null; reject(new Error('SSE connection error'));
      };
    });
  }

  // ── Run single step via ▶ button ──────────────────────────────────────────
  async function handleRunStep(stepId) {
    if (isRunning) return;
    lockUI();
    try { await runStep(stepId); } catch { /* status already updated */ }
    unlockUI();
  }

  // ── Run All ──────────────────────────────────────────────────────────────
  async function handleRunAll() {
    if (isRunning) return;
    resetAllSteps();
    selectedStep = null;
    globalLog = '';
    showGlobalLog();
    lockUI();

    const pLabel = { 'vercel-edge': 'Vercel Edge', edge: 'CF Edge', clone: 'Clone + GEO', template: 'Template' }[pipeline];
    appendGlobal(`<span class="t-header">⚡  Run All — ${pLabel} pipeline\n</span>`);
    appendGlobal(`<span class="t-muted">URL: ${getUrl()}\nClient: ${getClient()}\n</span>`);
    if (pipeline === 'template') {
      appendGlobal(`<span class="t-muted">Scheme: ${getScheme()}\nScrape: ${getScrapeMode()}\n</span>`);
    }
    appendGlobal(`\n`);

    const steps = getSteps();
    let stopped = false;

    for (const s of steps) {
      if (stopped) { setStepState(s.id, 'idle'); continue; }
      try {
        await runStep(s.id);
      } catch {
        stopped = true;
        // Switch back to global view to show error summary
        selectedStep = null;
        updateSelectedVisual();
        appendGlobal(`\n<span class="t-error">Pipeline stopped at Step ${s.id}. Fix the error and rerun.\n</span>`);
        showGlobalLog();
        setStatus(`Pipeline failed at Step ${s.id}`);
      }
    }

    if (!stopped) {
      selectedStep = null;
      updateSelectedVisual();
      appendGlobal(`\n<span class="t-divider">${'─'.repeat(60)}\n</span>`);
      appendGlobal(`<span class="t-done">All steps completed successfully!\n</span>`);
      showGlobalLog();
      setStatus('Pipeline complete');
      termTitle.textContent = 'All steps done';
    }
    unlockUI();
  }

  // ── Check env vars on load ────────────────────────────────────────────────
  async function checkEnv() {
    try {
      const res  = await fetch('/api/env');
      const data = await res.json();
      const fc = document.getElementById('pill-firecrawl');
      const an = document.getElementById('pill-anthropic');
      fc.className = `env-pill ${data.firecrawl ? 'ok' : 'miss'}`;
      an.className = `env-pill ${data.anthropic  ? 'ok' : 'miss'}`;
      if (!data.firecrawl || !data.anthropic) {
        appendGlobal(`<span class="t-stderr">Some API keys are missing in .env.local\n`);
        if (!data.firecrawl) appendGlobal(`   FIRECRAWL_API_KEY — needed for template pipeline scrape\n`);
        if (!data.anthropic)  appendGlobal(`   ANTHROPIC_API_KEY — needed for content extraction\n`);
        appendGlobal(`</span>\n`);
      } else {
        appendGlobal(`<span class="t-done">API keys loaded — Firecrawl + Anthropic ready\n</span>\n`);
      }
    } catch {
      appendGlobal(`<span class="t-stderr">Could not reach server API.\n</span>`);
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  setPipeline('vercel-edge');
  appendGlobal(`<span class="t-muted">GEO Reforge Console · ready\nClick a step to view its log. Click ▶ or Run All to execute.\n\n</span>`);
  checkEnv();
</script>
</body>
