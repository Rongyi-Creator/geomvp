name: GEO Alignment Check

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      client:
        description: 'Client ID (default: virum)'
        default: 'virum'
        required: false
      force:
        description: 'Skip recency guard'
        type: boolean
        default: false

jobs:
  alignment:
    name: Run alignment check
    runs-on: ubuntu-latest
    outputs:
      score: ${{ steps.run.outputs.score }}
      grade: ${{ steps.run.outputs.grade }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run alignment
        id: run
        env:
          OUTSCRAPER_API_KEY: ${{ secrets.OUTSCRAPER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DASHBOARD_WORKER_URL: ${{ secrets.DASHBOARD_WORKER_URL }}
          DASHBOARD_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          CLIENT="${{ inputs.client || 'virum' }}"
          FLAGS="${{ inputs.force && '--force' || '' }} --no-email ${{ github.event_name == 'workflow_dispatch' && '--run-type=manual' || '' }}"
          pnpm tsx scripts/alignment/run.ts $CLIENT $FLAGS

      # Success/TODO messaging is owned by run.ts (one consolidated message; silent when a
      # scheduled run has nothing actionable). This step only fires on failure — including
      # the degraded-run guard's exit 1 — which run.ts can't report itself.
      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CLIENT: ${{ inputs.client || 'virum' }}
        run: |
          TEXT=":x: Alignment check *failed* for *${CLIENT}* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"${TEXT}\"}"

  # send-email job disabled during internal testing — re-enable when ready for client emails
  # send-email:
  #   name: Send client email (3h delay)
  #   needs: alignment
  #   if: needs.alignment.result == 'success'
